<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>About Us - SPACESTRY Studio</title>

  <!-- Global Styles -->
  <link rel="stylesheet" href="styles.css">

  <!-- Favicon (rounded, consistent across all pages) -->
  <link rel="icon" type="image/png" href="/logo-rounded.png">
  <link rel="apple-touch-icon" href="/logo-rounded.png">
  <script src="project-script.js" defer></script>
  <meta name="theme-color" content="#1F4C3E">
  <style>
    /* ── About page layout ── */

    body {
      /* Reserve fixed element heights so flex centering is accurate */
      padding-top: 48px;    /* secondary-nav */
      padding-bottom: 84px; /* footer */
      min-height: 100vh;
      max-height: 100vh;    /* no scroll at 1.0 scale */
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Always-visible secondary nav */
    #secondary-nav {
      opacity: 1 !important;
      transform: translateY(0) !important;
      pointer-events: auto !important;
    }

    /* Fixed footer */
    .site-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      opacity: 1;
    }

    /* ── Main ── */
    .about-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      /* 4% horizontal = premium breathing room; minimal vertical (body padding handles it) */
      padding: clamp(20px, 2.5vw, 40px) 4%;
    }

    /* ── Two-column row ── */
    /* Geometry:  padding 4%+4% = 8%  |  gap 3vw  |  image 29vw  →  text ≈ 60vw (≈ ⅔ screen) */
    .about-layout {
      display: flex;
      align-items: center;
      gap: clamp(32px, 3vw, 56px);
      width: 100%;
      max-width: 1440px;
    }

    /* ── Left: text column (~⅔ screen) ── */
    .about-text {
      flex: 1 1 0%;
      min-width: 0;
    }

    .about-text h1 {
      margin-top: 0;
      margin-bottom: clamp(20px, 2.2vw, 36px);
      line-height: 1.03;
    }

    .about-text h3 {
      margin-bottom: clamp(16px, 1.8vw, 28px);
      line-height: 1.35;
    }

    .about-text p {
      margin-bottom: 0;
      line-height: 1.75;
    }

    .about-text p + p {
      margin-top: clamp(10px, 1.2vw, 18px);
    }

    /* ── Right: image column (just under ⅓ screen) ── */
    .about-image {
      flex: 0 0 29vw;
      max-width: 29vw;
      align-self: stretch; /* fill the full content-area height */
      display: flex;
      align-items: center;
    }

    .about-image img {
      width: 80%;
      /* Height = viewport minus nav, footer, and main's vertical padding */
      height: calc(100vh - 48px - 84px - clamp(40px, 5vw, 80px)*0.8);
      object-fit: cover;
      object-position: center top;
      display: block;
      margin: 0 auto; 
    }

    /* ── Mobile: stack vertically, re-enable scroll ── */
    @media (max-width: 768px) {
      body {
        max-height: none;
        overflow-y: auto;
        padding-bottom: 84px;
      }

      .about-layout {
        flex-direction: column;
        gap: 36px;
      }

      .about-image {
        flex: 0 0 auto;
        max-width: 100%;
        width: 80%;
        height: calc(56vw*0.8);
        align-self: auto;
      }

      .about-image img {
        width: 100%;
        height: 56vw;
        object-fit: cover;
      }
    }
  </style>
</head>

<body>

  <!--nav-->
  <nav id="secondary-nav" aria-label="Secondary navigation">
  <div class="secondary-nav-inner">
    <!-- Logo group: only shown on non-homepage pages -->
      <a href="index.html" class="secondary-nav-logo" aria-label="SPACESTRY Home">
      <img src="mono-logo.png" alt="" aria-hidden="true" height="28" width="28">
      <img src="logo-text.png" alt="SPACESTRY" height="24">
    </a>
    <ul class="secondary-nav-links">
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </div>
</nav>
  
 <main class="about-main">
    <div class="about-layout">

      <!-- Text column -->
      <div class="about-text">
        <h1>About SPACESTRY</h1>
        <h3>
  <span class="founder">Ayesha Agarwal</span>
  <span class="qualification">(BA Hons. Interior Architecture &amp; Design)</span>
</h3>
        <p>Exploring the quiet chemistry between space and the people within.</p>
      
      </div>
<div class="about-divider"></div>
      
      <!-- Image column: just under ⅓ screen width -->
      <div class="about-image">
        <img src="team.png" alt="The SPACESTRY team">
      </div>

    </div>
  </main>
  
  <footer class="site-footer" role="contentinfo">
  <div class="site-footer__inner">
    <small class="site-footer__copyright">© SPACESTRY 2022-26. All rights reserved.</small>
    <a class="site-footer__top" href="#top" aria-label="Scroll to top">Go up ↑</a>
  </div>
</footer>

</body>
</html>
