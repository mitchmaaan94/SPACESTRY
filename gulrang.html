<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>GULRANG - SPACESTRY Studio</title>

  <!-- Global Styles -->
  <link rel="stylesheet" href="styles.css">

  <!-- Favicon (rounded, consistent across all pages) -->

  <link rel="apple-touch-icon" href="/logo-rounded.png">
  <meta name="theme-color" content="#1F4C3E">
</head>

<body>
  <!-- Header -->
  <header class="header">
    <img src="logo-text.png" class="header-logo">

  </header>

  <!-- Gallery -->
  <div class="gallery-container">
    <div class="grid-container">

      <div class="grid-item">
        <img src="images/GULRANG - 01.jpg" alt="GULRANG 01">

      </div>
      <div class="grid-item">
        <img src="images/GULRANG - 02.jpg" alt="GULRANG 02">
        <div class="watermark"></div>
      </div>
      <div class="grid-item">
        <img src="images/GULRANG - 03.jpg" alt="GULRANG 03">
        <div class="watermark"></div>
      </div>
      <div class="grid-item">
        <img src="images/GULRANG - 04 - H.jpg" alt="GULRANG 04">
        <div class="watermark"></div>
      </div>
      <div class="grid-item">
        <img src="images/GULRANG - 05.jpg" alt="GULRANG 05">
        <div class="watermark"></div>
      </div>
      <div class="grid-item">
        <img src="images/GULRANG - 06.jpg" alt="GULRANG 06">
        <div class="watermark"></div>
      </div>
      <div class="grid-item">
        <img src="images/GULRANG - 07.jpg" alt="GULRANG 07">
        <div class="watermark"></div>
      </div>
      <div class="grid-item">
        <img src="images/GULRANG - 08.jpg" alt="GULRANG 08">
        <div class="watermark"></div>
      </div>
      
    </div>
  </div>
</body>
</html>
