<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 20px;
        }
        .grid-item {
            border: 1px solid #ccc;
            border-radius: 4px;
            overflow: hidden;
        }
        .grid-item img {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="grid-item"><img src="Akshar Elysium 102 - 01.jpg" alt="Akshar Elysium 102 - 01"></div>
        <div class="grid-item"><img src="Akshar Elysium 102 - 02.jpg" alt="Akshar Elysium 102 - 02"></div>
        <div class="grid-item"><img src="Akshar Elysium 102 - 03.jpg" alt="Akshar Elysium 102 - 03"></div>
        <div class="grid-item"><img src="Akshar Elysium 102 - 04.jpg" alt="Akshar Elysium 102 - 04"></div>
        <div class="grid-item"><img src="Akshar Elysium 102 - 05.jpg" alt="Akshar Elysium 102 - 05"></div>
        <div class="grid-item"><img src="Akshar Elysium 102 - 06.jpg" alt="Akshar Elysium 102 - 06"></div>
        <div class="grid-item"><img src="GD - PK - 03.JPG" alt="GD - PK - 03"></div>
        <div class="grid-item"><img src="GD - PK - 06.JPG" alt="GD - PK - 06"></div>
    </div>
</body>
</html>
