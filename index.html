<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SPACESTRY — Interior Design Studio</title>

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Favicon (SVG - primary) -->
    <link rel="icon" type="image/svg+xml" href="logo-svg.svg">

    <!-- Fallback for older browsers -->
    <link rel="alternate icon" href="logo.png">

    <!-- Apple (iPhone/iPad icon) -->
    <link rel="apple-touch-icon" href="logo.png">

    <!-- Theme color (matches your green) -->
    <meta name="theme-color" content="#1F4C3E">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loader" class="loader">
        <div class="loader-content">
            <img src="logo.png" alt="SPACESTRY Monogram" class="loader-logo">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="content" class="hidden">
        <!-- Header -->
        <header class="header">
            <img src="logo-text.png" alt="SPACESTRY Logo" class="header-logo">
            <p class="tagline">Interior Design Studio | Ahmedabad | Delhi</p>
        </header>

        <!-- Gallery Grid -->
        <div class="gallery-container">
            <div class="grid-container">
                <div class="grid-item"><img src="Akshar Elysium 102 - 01.jpg" alt="Gallery Image 1"></div>
                <div class="grid-item"><img src="Akshar Elysium 102 - 02.jpg" alt="Gallery Image 2"></div>
                <div class="grid-item"><img src="Akshar Elysium 102 - 03.jpg" alt="Gallery Image 3"></div>
                <div class="grid-item"><img src="Akshar Elysium 102 - 04.jpg" alt="Gallery Image 4"></div>
                <div class="grid-item"><img src="Akshar Elysium 102 - 05.jpg" alt="Gallery Image 5"></div>
                <div class="grid-item"><img src="Akshar Elysium 102 - 06.jpg" alt="Gallery Image 6"></div>
                <div class="grid-item"><img src="GD - PK - 03.JPG" alt="Gallery Image 7"></div>
                <div class="grid-item"><img src="GD - PK - 06.JPG" alt="Gallery Image 8"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
