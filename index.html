<!-- Footer -->
<footer class="site-footer" role="contentinfo">

    <small class="site-footer__copyright">© SPACESTRY 2022-26. All rights reserved.</small>

    <a class="site-footer__top" href="#top" aria-label="Scroll to top">Go up ↑</a>
  </div>
</footer>

<script>
  // Smooth scroll-to-top for the footer link
  (function () {
    const topLink = document.querySelector('.site-footer__top');
    if (!topLink) return;

    topLink.addEventListener('click', function (e) {
      e.preventDefault();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  })();
</script>
